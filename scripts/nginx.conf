server {
    listen 80;
    server_name servermon.example.com; # Replace with your domain

    # Redirection to HTTPS (Assumes Certbot)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name servermon.example.com; # Replace with your domain

    # SSL configuration (Path usually managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/servermon.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/servermon.example.com/privkey.pem;

    # Performance & Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    location / {
        proxy_pass http://localhost:8912;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Logging
    access_log /var/log/nginx/servermon_access.log;
    error_log /var/log/nginx/servermon_error.log;
}
