# Reference template — the installer generates the actual Nginx config.
# If configuring manually, copy this to /etc/nginx/sites-available/servermon
# then: ln -s /etc/nginx/sites-available/servermon /etc/nginx/sites-enabled/
# Replace YOUR_DOMAIN and reload: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    location / {
        proxy_pass http://127.0.0.1:8912;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Long timeouts for SSE and WebSocket streams
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    access_log /var/log/nginx/servermon_access.log;
    error_log /var/log/nginx/servermon_error.log;
}

# After running certbot, an HTTPS block will be auto-generated.
# To set up SSL manually:
#   sudo certbot --nginx -d YOUR_DOMAIN
