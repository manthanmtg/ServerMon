name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-artifacts-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.platform }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            platform: linux
            arch: x64
          - runner: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - runner: macos-15-intel
            platform: darwin
            arch: x64
          - runner: macos-15
            platform: darwin
            arch: arm64

    env:
      TARGET: ${{ matrix.platform }}-${{ matrix.arch }}
      NEXT_TELEMETRY_DISABLED: '1'
      MONGO_URI: mongodb://localhost:27017/servermon-build
      JWT_SECRET: build_time_temporary_secret
      PORT: '8912'
      NODE_ENV: production

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build hub application
        run: pnpm build

      - name: Prune development dependencies
        run: pnpm prune --prod

      - name: Package hub and agent artifacts
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="$RUNNER_TEMP/servermon-release"
          ASSET_DIR="$GITHUB_WORKSPACE/release-assets"
          HUB_DIR="$DIST_DIR/servermon-hub-$TARGET"
          AGENT_DIR="$DIST_DIR/servermon-agent-$TARGET"

          rm -rf "$DIST_DIR" "$ASSET_DIR"
          mkdir -p "$HUB_DIR" "$AGENT_DIR" "$ASSET_DIR"

          common_paths=(
            package.json
            pnpm-lock.yaml
            next.config.ts
            tsconfig.json
            src
            node_modules
            scripts
          )

          optional_paths=(
            .env.example
            README.md
            DEPLOY.md
            public
            postcss.config.mjs
          )

          copy_paths() {
            local dest="$1"
            shift
            for path in "$@"; do
              if [ -e "$path" ]; then
                cp -a "$path" "$dest/"
              fi
            done
          }

          copy_paths "$HUB_DIR" "${common_paths[@]}" "${optional_paths[@]}"
          cp -a .next "$HUB_DIR/"
          rm -rf "$HUB_DIR/.next/cache"

          copy_paths "$AGENT_DIR" "${common_paths[@]}" "${optional_paths[@]}"

          for dir in "$HUB_DIR" "$AGENT_DIR"; do
            cat > "$dir/RELEASE_MANIFEST.txt" <<MANIFEST
          ServerMon artifact
          target=$TARGET
          commit=$GITHUB_SHA
          ref=$GITHUB_REF_NAME
          built_at=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          MANIFEST
          done

          tar -czf "$ASSET_DIR/servermon-hub-$TARGET.tar.gz" -C "$DIST_DIR" "servermon-hub-$TARGET"
          tar -czf "$ASSET_DIR/servermon-agent-$TARGET.tar.gz" -C "$DIST_DIR" "servermon-agent-$TARGET"

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: package-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.tar.gz
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          pattern: package-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd release-assets
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Publish release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*.tar.gz
            release-assets/SHA256SUMS
